<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Admin Console{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --surface: #0f1623;
            --card: #141d2e;
            --card-hi: #1c2840;
            --line: rgba(255, 255, 255, 0.07);
            --line-hi: rgba(255, 255, 255, 0.04);

            --indigo: #6366f1;
            --indigo-dim: rgba(99, 102, 241, 0.12);
            --indigo-glow: rgba(99, 102, 241, 0.25);

            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --danger: #f87171;
            --danger-bg: rgba(248, 113, 113, 0.1);

            --txt: #e2e8f0;
            --txt-soft: #64748b;
            --txt-muted: #2d3f5a;

            --r: 12px;
            --r-sm: 8px;
            --header-h: 56px;
            --nav-h: 60px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--txt);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── HEADER ─── */
        .app-header {
            height: var(--header-h);
            background: rgba(8, 12, 20, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--indigo);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: var(--txt);
            letter-spacing: -0.3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--r-sm);
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--txt-soft);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
        }

        .icon-btn:hover {
            border-color: var(--indigo);
            color: var(--indigo);
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: var(--card-hi);
        }

        /* ─── DRAWER NAV ─── */
        .nav-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 70;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s;
        }

        .nav-backdrop.open {
            opacity: 1;
            visibility: visible;
        }

        .nav-drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--line);
            z-index: 80;
            display: flex;
            flex-direction: column;
            padding: 0;
            transform: translateX(-100%);
            transition: transform 0.3s var(--ease);
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.4);
        }

        .nav-drawer.open {
            transform: translateX(0);
        }

        .nav-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            height: var(--header-h);
        }

        .nav-drawer-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--txt-soft);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .nav-items {
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--r-sm);
            color: var(--txt-soft);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--card);
            color: var(--txt);
        }

        .nav-item.active {
            background: var(--indigo-dim);
            color: var(--indigo);
            font-weight: 600;
        }

        .nav-item svg {
            flex-shrink: 0;
        }

        .nav-footer {
            padding: 12px 10px;
            border-top: 1px solid var(--line);
        }

        /* ─── BOTTOM NAV (mobile) ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 50;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .bnav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--txt-muted);
            text-decoration: none;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex: 1;
            padding: 8px 4px;
            border-radius: var(--r-sm);
            transition: all 0.2s;
        }

        .bnav-item svg {
            width: 20px;
            height: 20px;
            transition: transform 0.2s;
        }

        .bnav-item.active {
            color: var(--indigo);
        }

        .bnav-item.active svg {
            transform: translateY(-1px);
            filter: drop-shadow(0 0 6px var(--indigo-glow));
        }

        /* ─── MAIN CONTENT ─── */
        .main-content {
            flex: 1;
            padding: 16px;
            padding-bottom: calc(16px + var(--nav-h) + env(safe-area-inset-bottom));
            width: 100%;
            max-width: 100%;
        }

        /* ─── COMPONENTS ─── */

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--r);
            padding: 16px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-decoration: none;
            min-height: 40px;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--indigo);
            color: #fff;
        }

        .btn-primary:hover {
            background: #5558e8;
        }

        .btn-outline {
            background: transparent;
            border-color: var(--line);
            color: var(--txt-soft);
        }

        .btn-outline:hover {
            border-color: var(--indigo);
            color: var(--indigo);
        }

        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border-color: rgba(248, 113, 113, 0.2);
        }

        .btn-success {
            background: var(--success-bg);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            min-height: 32px;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-success {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .badge-warning {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .badge-indigo {
            background: var(--indigo-dim);
            color: var(--indigo);
        }

        /* Form elements */
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--txt-soft);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--card-hi);
            border: 1.5px solid var(--line);
            border-radius: var(--r-sm);
            color: var(--txt);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--indigo);
        }

        .form-textarea {
            resize: vertical;
            min-height: 110px;
        }

        .form-select option {
            background: var(--card);
        }

        /* Section headers */
        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--txt);
            letter-spacing: -0.4px;
        }

        .page-sub {
            font-size: 13px;
            color: var(--txt-soft);
            margin-top: 2px;
        }

        .section-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        /* Dividers */
        .divider {
            height: 1px;
            background: var(--line);
            margin: 16px 0;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--card-hi) 25%, var(--card) 50%, var(--card-hi) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--line);
            border-top-color: var(--indigo);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast */
        #toast-container {
            position: fixed;
            bottom: calc(var(--nav-h) + 12px);
            left: 12px;
            right: 12px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--card-hi);
            border: 1px solid var(--line);
            color: var(--txt);
            padding: 12px 16px;
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: toastIn 0.3s var(--ease);
            transition: opacity 0.3s, transform 0.3s;
        }

        @keyframes toastIn {
            from {
                transform: translateY(12px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Tables */
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--r-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead th {
            padding: 10px 12px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--txt-soft);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--line-hi);
            transition: background 0.15s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--card-hi);
        }

        tbody td {
            padding: 12px;
            color: var(--txt);
            vertical-align: middle;
        }

        /* Utilities */
        .text-sm {
            font-size: 13px;
        }

        .text-xs {
            font-size: 11px;
        }

        .text-soft {
            color: var(--txt-soft);
        }

        .text-muted {
            color: var(--txt-muted);
        }

        .font-medium {
            font-weight: 500;
        }

        .font-semibold {
            font-weight: 600;
        }

        .gap-2 {
            gap: 8px;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .mb-4 {
            margin-bottom: 16px;
        }

        .mt-4 {
            margin-top: 16px;
        }

        .w-full {
            width: 100%;
        }

        /* ─── DESKTOP ─── */
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }

            .main-content {
                padding: 24px 32px;
                padding-bottom: 32px;
                max-width: 1280px;
                margin: 0 auto;
            }

            .section-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }

            #toast-container {
                bottom: 24px;
                left: auto;
                right: 24px;
                max-width: 360px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- ── HEADER ── -->
    <header class="app-header">
        <a href="/" class="brand">
            <div class="brand-icon">⚡</div>
            <span class="brand-name">BotAdmin</span>
        </a>

        <div class="header-right">
            <!-- Refresh -->
            <button class="icon-btn" onclick="location.reload()" title="Actualizar">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10" />
                    <polyline points="1 20 1 14 7 14" />
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                </svg>
            </button>

            <!-- Logout -->
            <a href="/logout" class="icon-btn" title="Salir">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </a>

            <!-- Hamburger (mobile) -->
            <button class="icon-btn" id="menuBtn" onclick="toggleDrawer()" style="display:flex;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
        </div>
    </header>

    <!-- ── DRAWER BACKDROP ── -->
    <div class="nav-backdrop" id="backdrop" onclick="toggleDrawer()"></div>

    <!-- ── NAV DRAWER ── -->
    <nav class="nav-drawer" id="navDrawer">
        <div class="nav-drawer-header">
            <span class="nav-drawer-title">Navegación</span>
            <button class="icon-btn" onclick="toggleDrawer()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>

        <div class="nav-items">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
                Dashboard
            </a>
            <a href="/users" class="nav-item {% if '/user' in request.path %}active{% endif %}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                Usuarios
            </a>
            <a href="/analytics" class="nav-item {% if request.path == '/analytics' %}active{% endif %}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
                Analytics
            </a>
            <a href="/activity" class="nav-item {% if request.path == '/activity' %}active{% endif %}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                Actividad
            </a>
            <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                Configuración
            </a>
        </div>

        <div class="nav-footer">
            <a href="/logout" class="btn btn-outline w-full">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Cerrar sesión
            </a>
        </div>
    </nav>

    <!-- ── MAIN ── -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- ── BOTTOM NAV (mobile) ── -->
    <nav class="bottom-nav">
        <a href="/" class="bnav-item {% if request.path == '/' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
            </svg>
            Panel
        </a>
        <a href="/users" class="bnav-item {% if '/user' in request.path %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Usuarios
        </a>
        <a href="/activity" class="bnav-item {% if request.path == '/activity' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
            Actividad
        </a>
        <a href="/settings" class="bnav-item {% if request.path == '/settings' %}active{% endif %}">

    <!-- ── TOAST ── -->
    <div id="toast-container"></div>

    <script>
        // === DRAWER ===
        function toggleDrawer() {
            const d = document.getElementById('navDrawer');
            const b = document.getElementById('backdrop');
            const open = d.classList.toggle('open');
            b.classList.toggle('open', open);
            document.body.style.overflow = open ? 'hidden' : '';
        }

        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => {
                document.getElementById('navDrawer').classList.remove('open');
                document.getElementById('backdrop').classList.remove('open');
                document.body.style.overflow = '';
            });
        });

        // === UTILS ===
        const Utils = {
            fmt: n => new Intl.NumberFormat('es-ES').format(n),

            toast(msg, type = 'info') {
                const c = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'toast';
                const icons = {
                    success: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
                    error: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--danger)"  stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
                    info: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--indigo)"   stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="8"/><line x1="12" y1="12" x2="12" y2="16"/></svg>`,
                };
                t.innerHTML = `${icons[type] || icons.info} <span>${msg}</span>`;
                c.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; setTimeout(() => t.remove(), 300); }, 3500);
            },

            debounce(fn, ms) {
                let id;
                return (...args) => { clearTimeout(id); id = setTimeout(() => fn(...args), ms); };
            }
        };
    </script>

    {% block extra_js %}{% endblock %}
